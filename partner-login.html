<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Access — Feild Inc</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #12100E;
    --dark2: #1C1916;
    --dark3: #252220;
    --text: #F0EDE8;
    --text-muted: #9E9890;
    --border: rgba(201,168,76,0.2);
    --error: #c0392b;
  }
  html, body { height: 100%; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: rgba(18,16,14,0.97);
    border-bottom: 0.5px solid var(--border);
    padding: 0 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    flex-shrink: 0;
  }
  .nav-logo { font-size: 18px; letter-spacing: 0.14em; color: var(--gold); font-weight: 400; line-height: 1; font-family: Georgia, serif; text-decoration: none; }
  .nav-logo span { color: var(--text-muted); font-size: 10px; display: block; letter-spacing: 0.22em; font-family: -apple-system, sans-serif; margin-top: 2px; text-transform: uppercase; }
  .nav-back { font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
  .nav-back:hover { color: var(--gold); }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  /* subtle grid background */
  main::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.025;
    background-image: linear-gradient(var(--gold) 1px, transparent 1px), linear-gradient(90deg, var(--gold) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none;
  }

  .login-card {
    position: relative;
    background: var(--dark2);
    border: 0.5px solid var(--border);
    padding: 3rem 2.75rem;
    width: 100%;
    max-width: 420px;
  }
  .card-kicker {
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-kicker::before { content: ''; display: block; width: 20px; height: 0.5px; background: var(--gold); flex-shrink: 0; }
  .card-title { font-family: Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 400; color: var(--text); line-height: 1.2; margin-bottom: 0.5rem; }
  .card-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 2.25rem; }

  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--dark3);
    border: 0.5px solid rgba(201,168,76,0.25);
    color: var(--text);
    font-family: -apple-system, sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--gold);
  }
  input[type="text"]::placeholder, input[type="password"]::placeholder { color: rgba(158,152,144,0.45); }

  .error-msg {
    font-size: 12px;
    color: #e57373;
    margin-bottom: 1.25rem;
    display: none;
    padding: 10px 14px;
    background: rgba(192,57,43,0.12);
    border-left: 2px solid #c0392b;
  }
  .error-msg.visible { display: block; }

  .btn-submit {
    width: 100%;
    background: var(--gold);
    color: var(--dark);
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 14px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0 1.5rem; }
  .card-note { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
  .card-note a { color: var(--gold); text-decoration: none; }
  .card-note a:hover { text-decoration: underline; }

  /* FOOTER */
  footer {
    background: var(--dark);
    border-top: 0.5px solid var(--border);
    padding: 1.25rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  @media (max-width: 480px) {
    nav { padding: 0 1.25rem; }
    footer { padding: 1.25rem; flex-direction: column; gap: 0.5rem; align-items: flex-start; }
    .login-card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">FEILD INC
    <span>Enterprise Transformation</span>
  </a>
  <a href="index.html" class="nav-back">&larr; Back to main site</a>
</nav>

<main>
  <div class="login-card">
    <div class="card-kicker">Restricted Access</div>
    <h1 class="card-title">Partner Portal</h1>
    <p class="card-sub">Sign in with your partner credentials to access resources.</p>

    <div class="error-msg" id="errorMsg">Incorrect username or password.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="your username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••••" required>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
    </form>

    <hr class="divider">
    <p class="card-note">Need access? Contact <a href="mailto:Mick@FeildInc.com">Mick@FeildInc.com</a></p>
  </div>
</main>

<footer>
  <span>&copy; 2026 Feild Inc. All rights reserved.</span>
  <span>Enterprise Transformation Advisory</span>
</footer>

<script>
// ─────────────────────────────────────────────────────────────────
//  PARTNER CREDENTIALS
//  To add or change users:
//    1. Generate a SHA-256 hash of the password. You can use:
//       https://emn178.github.io/online-tools/sha256.html
//       or run: echo -n "yourpassword" | sha256sum
//    2. Add an entry below: "username": "sha256hash"
//    3. Commit and push — done.
//
//  Default accounts (change these before going live):
//    partner1 / partner2025
//    partner2 / feild2025
// ─────────────────────────────────────────────────────────────────
const USERS = {
  "partner1": "b1344673ddf54a171a195ba593eab0559e56e4dbd7c65aa2eae3cfc90b51576b",
  "partner2": "cf642d7aca7bddcfc9dcf6b2854f8b3f5d20b483066c7f34b9a350a1bed98fa0",
  "mick@feildinc.com": "113e30e7dc47e55e9ac89699c91340ef898707bcc46d3051adb0d24216423936"
};

// Internal session constants — must match index_partner.html exactly.
const SESSION_KEY  = "feild_partner_session";
const SESSION_SALT = "feildinc-partner-2025-xK9mQ3r";

async function sha256(str) {
  const buf = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(str)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

async function handleLogin(e) {
  e.preventDefault();
  const btn    = document.getElementById("submitBtn");
  const errEl  = document.getElementById("errorMsg");
  const user   = document.getElementById("username").value.trim().toLowerCase();
  const pass   = document.getElementById("password").value;

  btn.disabled = true;
  btn.textContent = "Signing in…";
  errEl.classList.remove("visible");

  try {
    const passHash = await sha256(pass);
    const expected = USERS[user];

    if (!expected || passHash !== expected) {
      errEl.classList.add("visible");
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }

    // Build a session token that can be verified without a server.
    const token = await sha256(user + "|" + SESSION_SALT);
    const session = JSON.stringify({ user, token, ts: Date.now() });
    sessionStorage.setItem(SESSION_KEY, session);

    window.location.href = "index_partner.html";
  } catch (err) {
    errEl.textContent = "An error occurred. Please try again.";
    errEl.classList.add("visible");
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
}

// If already authenticated, skip straight to the partner page.
(async function checkExisting() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return;
    const { user, token } = JSON.parse(raw);
    if (!USERS[user]) return;
    const expected = await sha256(user + "|" + SESSION_SALT);
    if (token === expected) window.location.href = "index_partner.html";
  } catch (_) { /* ignore */ }
})();
</script>

</body>
</html>
