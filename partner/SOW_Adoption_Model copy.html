<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOW managed services adoption model</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #f5f5f3;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  .page-title {
    font-size: 13px; font-weight: 500; letter-spacing: 0.05em;
    color: #888780; text-transform: uppercase; margin-bottom: 6px;
  }
  .page-heading {
    font-size: 22px; font-weight: 600; color: #0f6e56; margin-bottom: 4px;
  }
  .page-sub {
    font-size: 14px; color: #5f5e5a; margin-bottom: 24px; line-height: 1.6;
    max-width: 680px;
  }

  /* Phase nav */
  .phase-nav {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;
  }
  .pbtn {
    padding: 12px 10px; border: 1.5px solid #d3d1c7;
    background: #fff; color: #5f5e5a; border-radius: 8px;
    cursor: pointer; font-size: 12px; font-weight: 600;
    text-align: center; line-height: 1.4; transition: all 0.15s;
  }
  .pbtn span { display: block; font-weight: 400; font-size: 11px; margin-top: 2px; color: #888780; }
  .pbtn.on { border-color: var(--ph-color); background: var(--ph-light); color: var(--ph-dark); }
  .pbtn.on span { color: var(--ph-color); }
  .pbtn:hover:not(.on) { border-color: #888780; color: #2c2c2a; }

  /* Cumulative bar */
  .cum-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .cum-bar-label { font-size: 11px; color: #888780; white-space: nowrap; }
  .cum-dots { display: flex; gap: 4px; flex: 1; max-width: 180px; }
  .sdot { flex: 1; height: 4px; border-radius: 2px; background: #d3d1c7; transition: background 0.2s; }
  .sdot.on { background: var(--ph-color); }

  /* Section tabs */
  .stabs {
    display: flex; gap: 0; border-bottom: 1.5px solid #d3d1c7;
    margin-bottom: 18px; overflow-x: auto; padding-bottom: 0;
  }
  .stab {
    padding: 8px 14px; background: none; border: none;
    border-bottom: 2.5px solid transparent; margin-bottom: -1.5px;
    cursor: pointer; color: #888780; font-size: 13px; font-weight: 400;
    white-space: nowrap; transition: all 0.1s;
  }
  .stab.on { color: #2c2c2a; border-bottom-color: var(--ph-color); font-weight: 600; }

  /* Phase header */
  .phase-hdr { font-size: 17px; font-weight: 600; color: #2c2c2a; margin-bottom: 8px; }
  .meta-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 11px; border-radius: 20px; font-size: 12px;
    background: #fff; border: 1px solid #d3d1c7; color: #5f5e5a;
  }

  /* Content cards */
  .obj-box {
    padding: 14px 16px; background: #fff; border-radius: 10px;
    border: 1px solid #d3d1c7; margin-bottom: 12px;
    font-size: 14px; line-height: 1.65; color: #5f5e5a;
  }
  .obj-box strong { font-weight: 600; color: #2c2c2a; display: block; margin-bottom: 6px; }

  .item {
    padding: 9px 13px; border-left: 2.5px solid var(--ph-color);
    margin-bottom: 8px; background: #fff; border-radius: 0 8px 8px 0;
    font-size: 14px; line-height: 1.55;
  }
  .item.metric { border-left-color: #ba7517; background: #faeeda; color: #633806; }
  .item.resist { border-left-color: #993c1d; background: #faece7; color: #712b13; }

  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; margin: 3px 4px 3px 0;
    background: var(--ph-light); color: var(--ph-dark);
    border: 1px solid var(--ph-color);
  }

  .slbl { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #5f5e5a; }
  .slbl.metric { color: #ba7517; }
  .slbl.resist { color: #993c1d; }

  /* Framework table */
  .fw-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  .fw-table th {
    padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; border-bottom: 2px solid #d3d1c7; color: #5f5e5a;
    background: #f5f5f3;
  }
  .fw-table td {
    padding: 9px 10px; vertical-align: top; border-bottom: 1px solid #e8e7e3;
    line-height: 1.5;
  }
  .fw-table tr:last-child td { border-bottom: none; }
  .fw-table tr:nth-child(even) td { background: #f9f9f7; }
  .fw-table .elem { font-weight: 600; color: #2c2c2a; }
  .fw-table .wwd { color: #0f6e56; font-style: italic; font-size: 12px; }
  .fw-table .tier-na { color: #c0bfb8; }
  .fw-table .tier { color: #2c2c2a; }

  /* KPI table */
  .kpi-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  .kpi-table th {
    padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; border-bottom: 2px solid #d3d1c7; color: #5f5e5a;
    background: #f5f5f3;
  }
  .kpi-table td {
    padding: 9px 10px; vertical-align: top; border-bottom: 1px solid #e8e7e3;
    line-height: 1.5;
  }
  .kpi-table tr:last-child td { border-bottom: none; }
  .kpi-table tr:nth-child(even) td { background: #faf9f6; }
  .kpi-cat-row td {
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    color: #ba7517; background: #faeeda !important; padding: 5px 10px;
    text-transform: uppercase;
  }
  .kpi-table .kpi-name { font-weight: 600; color: #2c2c2a; }
  .kpi-table .kpi-src { color: #888780; font-size: 12px; }
  .kpi-table .kpi-note { color: #888780; font-size: 12px; font-style: italic; }

  .resist-note {
    font-size: 12px; font-weight: 600; color: #993c1d; margin-bottom: 8px;
  }
</style>
</head>

  <h1 class="page-heading">SOW adoption model</h1>
  <p class="page-sub">Each phase builds on the last. Win on the transactional before claiming the strategic — attempting phases 3–4 before phases 1–2 are demonstrably working is the most common failure mode.</p>

  <div id="metaChips" class="meta-chips"></div>

  <div class="stabs" id="stabs"></div>
  <div id="content"></div>
</div>

    fw: [
      {elem:"RFx launch", wwd:"Implement client projects delivering agreed benefits", admin:"—", mgmt:"Responsible for the facilitation of the RFx", proc:"Responsible, with managers, for defining, drafting and launching RFx process and documents to selected vendors/suppliers/bidders"},
      {elem:"RFx review/assessment", wwd:"Implement client projects delivering agreed benefits", admin:"—", mgmt:"Responsible for facilitation of RFx assessment", proc:"Responsible, with managers, for reviewing and assessing RFx responses from vendors/suppliers/bidders to identify shortlisted bidders"},
      {elem:"RFx negotiation", wwd:"Negotiate options for supply", admin:"—", mgmt:"Support negotiations", proc:"Responsible, with managers, for negotiation with vendors/suppliers/bidders to identify preferred bidders"},
    ],
    kpis: [
      {cat:"Operational efficiency", name:"Bid activity ratio", desc:"Ratio of SOWs that are sourced through VMS", src:"VMS (MSP)", note:""},
      {cat:"Operational efficiency", name:"Bid (RFP) pipeline efficiency", desc:"Ratio of acceptable bids received per opportunity", src:"VMS (MSP)", note:""},
      {cat:"Financial & cost", name:"Invoice accuracy rate", desc:"Percentage of invoices aligned with agreed milestones, rates, and deliverables processed without errors", src:"FMS (Client) / Supplier", note:"Invoice error rate reporting from client AP"},
      {cat:"Supplier & vendor performance", name:"Milestone achievement rate", desc:"Percentage of deliverables or milestones completed on time", src:"VMS (MSP)", note:""},
      {cat:"Supplier & vendor performance", name:"Vendor performance score", desc:"Composite score based on quality, timeliness, and communication", src:"Offline", note:"Surveys need to be configured"},
      {cat:"Supplier & vendor performance", name:"SOW renewal rate", desc:"Percentage of SOWs extended or renewed due to successful delivery (repeat activity)", src:"VMS (MSP)", note:""},
      {cat:"Supplier & vendor performance", name:"Dispute resolution time", desc:"Average time to resolve issues or disputes related to SOWs", src:"TT System (MSP)", note:""},
      {cat:"Supplier & vendor performance", name:"CCN / change request ratio", desc:"Ratio of the change requests processed per SOW", src:"VMS (MSP)", note:""},
    ],
  },
];

const SECTIONS = ["Overview","Activities & tooling","Metrics","Resistance signals","Framework elements","KPIs"];
let cp = 0, cs = 0;

function applyPhaseVars(p) {
  document.documentElement.style.setProperty('--ph-color', p.color);
  document.documentElement.style.setProperty('--ph-light', p.light);
  document.documentElement.style.setProperty('--ph-dark', p.dark);
}

function buildNav() {
  const nav = document.getElementById('phaseNav');
  const dots = document.getElementById('cumDots');
  PHASES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'pbtn' + (i === 0 ? ' on' : '');
    btn.innerHTML = `Phase ${p.num}<span>${p.title.replace(/Phase \d+ — /,'')}</span>`;
    btn.onclick = () => setPhase(i);
    nav.appendChild(btn);

    const dot = document.createElement('div');
    dot.className = 'sdot' + (i === 0 ? ' on' : '');
    dot.id = 'dot' + i;
    dots.appendChild(dot);
  });
}

function buildSectionTabs() {
  const tabs = document.getElementById('stabs');
  SECTIONS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'stab' + (i === 0 ? ' on' : '');
    btn.textContent = s;
    btn.onclick = () => setSection(i);
    tabs.appendChild(btn);
  });
}

function setPhase(i) {
  cp = i;
  document.querySelectorAll('.pbtn').forEach((b,j) => b.classList.toggle('on', j===i));
  for (let d=0;d<4;d++) document.getElementById('dot'+d).classList.toggle('on', d<=i);
  applyPhaseVars(PHASES[i]);
  render();
}

function setSection(i) {
  cs = i;
  document.querySelectorAll('.stab').forEach((b,j) => b.classList.toggle('on', j===i));
  render();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const p = PHASES[cp];
  document.getElementById('phaseHdr').textContent = p.title;
  document.getElementById('metaChips').innerHTML =
    `<span class="chip">⏱ ${p.timeline}</span>` +
    `<span class="chip">Focus: ${p.mandate}</span>` +
    (cp > 0 ? `<span class="chip" style="color:#888780;font-size:11px">Includes all previous phases</span>` : '');

  let h = '';

  if (cs === 0) {
    h += `<div class="obj-box"><strong>Objective</strong>${esc(p.obj)}</div>`;
    h += `<div class="obj-box"><strong>Stakeholder dynamics</strong>${esc(p.stk)}</div>`;

  } else if (cs === 1) {
    h += `<div class="slbl">Key activities</div>`;
    p.acts.forEach(a => h += `<div class="item">${esc(a)}</div>`);
    h += `<div class="slbl" style="margin-top:16px">Tooling</div>`;
    p.tools.forEach(t => h += `<span class="tag">${esc(t)}</span>`);

  } else if (cs === 2) {
    h += `<div class="slbl metric">Success metrics</div>`;
    p.metrics.forEach(m => h += `<div class="item metric">${esc(m)}</div>`);

  } else if (cs === 3) {
    h += `<div class="resist-note">Watch for these — they signal the resistance is winning</div>`;
    p.resist.forEach(r => h += `<div class="item resist">${esc(r)}</div>`);

  } else if (cs === 4) {
    h += `<table class="fw-table"><thead><tr>
      <th style="width:20%">Element</th>
      <th style="width:22%">Service area</th>
      <th style="width:19%">Admin tier</th>
      <th style="width:19%">Management tier</th>
      <th style="width:20%">Procurement tier</th>
    </tr></thead><tbody>`;
    p.fw.forEach(f => {
      const na = (v) => v === '—' ? `<span class="tier-na">—</span>` : `<span class="tier">${esc(v)}</span>`;
      h += `<tr>
        <td><span class="elem">${esc(f.elem)}</span><br><span class="wwd">${esc(f.wwd)}</span></td>
        <td class="wwd">${esc(f.wwd)}</td>
        <td>${na(f.admin)}</td>
        <td>${na(f.mgmt)}</td>
        <td>${na(f.proc)}</td>
      </tr>`;
    });
    h += `</tbody></table>`;

  } else if (cs === 5) {
    h += `<table class="kpi-table"><thead><tr>
      <th style="width:22%">Metric</th>
      <th style="width:13%">Category</th>
      <th style="width:35%">Description</th>
      <th style="width:17%">Data source</th>
      <th style="width:13%">Notes</th>
    </tr></thead><tbody>`;
    let lastCat = null;
    p.kpis.forEach(k => {
      if (k.cat !== lastCat) {
        h += `<tr class="kpi-cat-row"><td colspan="5">${esc(k.cat)}</td></tr>`;
        lastCat = k.cat;
      }
      h += `<tr>
        <td class="kpi-name">${esc(k.name)}</td>
        <td class="kpi-src">${esc(k.cat)}</td>
        <td>${esc(k.desc)}</td>
        <td class="kpi-src">${esc(k.src)}</td>
        <td class="kpi-note">${esc(k.note)}</td>
      </tr>`;
    });
    h += `</tbody></table>`;
  }

  document.getElementById('content').innerHTML = h;
}

buildNav();
buildSectionTabs();
applyPhaseVars(PHASES[0]);
render();
</script>
</body>
</html>
